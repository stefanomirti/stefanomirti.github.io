html<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stefano mirti</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1c20;
      overflow: hidden;
      cursor: pointer;
    }

    #sky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      transition: filter 0.8s ease;
    }

    #sky.scurita {
      filter: brightness(0.45);
    }

    #testo {
      position: fixed;
      bottom: 2.5rem;
      right: 2rem;
      z-index: 1;
      font-family: 'EB Garamond', serif;
      font-size: 22px;
      line-height: 1.7;
      color: #f0ede6;
      max-width: 520px;
      padding: 0 1.5rem;
    }

    #punto {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 2;
      width: 20px;
      height: 20px;
      background: #f0ede6;
      border-radius: 50%;
      display: block;
      opacity: 0.7;
    }

    #punto:hover {
      opacity: 1;
    }

  </style>
</head>
<body>

  <img id="sky" alt="">
  <div id="testo"></div>
  <a id="punto" href="bio.html"></a>

  <script>
    const TOTAL_PHOTOS = 20;
    let frasi = [];
    let stato = 0;

    function pad(n) {
      return String(n).padStart(3, '0');
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function caricaFoto() {
      document.getElementById('sky').src = `foto/${pad(randomInt(1, TOTAL_PHOTOS))}.png`;
    }

    function caricaTesto() {
      if (frasi.length === 0) return;
      const t = frasi[randomInt(0, frasi.length - 1)];
      document.getElementById('testo').innerHTML = t.replace(/\n/g, '<br>');
    }

    document.body.addEventListener('click', function(e) {
      if (e.target.id === 'punto') return;
      const sky = document.getElementById('sky');

      if (stato === 0) {
        sky.classList.add('scurita');
        stato = 1;
      } else {
        sky.classList.remove('scurita');
        caricaFoto();
        caricaTesto();
        stato = 0;
      }
    });

    fetch('frasi.txt')
      .then(r => r.text())
      .then(testo => {
        frasi = testo
          .split(/\n\s*\n/)
          .map(f => f.trimEnd())
          .filter(f => f.length > 0);
        caricaTesto();
      })
      .catch(() => {});

    caricaFoto();
  </script>

</body>
</html>
